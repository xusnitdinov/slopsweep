# Optional weekly reminder workflow — enable in repos you maintain.
# Fork/copy this file, or use it as a template for org automation.
name: SlopSweep weekly reminder

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Post maintenance reminder
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'SlopSweep weekly: scan for Copilot tip residue';
            const body = [
              'Weekly reminder to scan open/closed PRs for leftover Copilot tips.',
              '',
              `- Dashboard: https://slopsweep.vercel.app/dashboard`,
              `- Public PR inspect: https://slopsweep.vercel.app/inspect`,
              '',
              'This issue is opened by the SlopSweep weekly workflow. Close it when done.',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'slopsweep',
              per_page: 10,
            });
            if (issues.some((i) => i.title === title)) {
              core.info('Reminder issue already open.');
              return;
            }
            try {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['slopsweep'],
              });
            } catch (e) {
              // Label may not exist — create without labels
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
